{{- if .Values.preflight.enabled }}
{{- range $crd := list "sandboxclaims.extensions.agents.x-k8s.io" "sandboxes.agents.x-k8s.io" "sandboxtemplates.extensions.agents.x-k8s.io" "sandboxwarmpools.extensions.agents.x-k8s.io" }}
{{- if not (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" $crd) }}
{{- fail (printf "required Agent Sandbox CRD %s is not installed" $crd) }}
{{- end }}
{{- end }}
{{- range $name, $pool := .Values.pools }}
{{- if and $pool.enabled (not (lookup "node.k8s.io/v1" "RuntimeClass" "" $pool.runtimeClassName)) }}
{{- fail (printf "Pool %s requires missing RuntimeClass %s" $name $pool.runtimeClassName) }}
{{- end }}
{{- end }}
{{- end }}
