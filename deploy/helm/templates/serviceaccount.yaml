{{- if ne (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must be exactly 1 until distributed acquisition coordination is implemented" }}
{{- end }}
{{- if not .Values.existingSecret }}{{ fail "existingSecret is required" }}{{ end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agent-sandbox-platform.fullname" . }}
  labels: {{- include "agent-sandbox-platform.labels" . | nindent 4 }}
automountServiceAccountToken: true
