apiVersion: v1
kind: Namespace
metadata:
  name: agent-sandbox-command-supervisor-gate
  labels:
    app.kubernetes.io/name: command-supervisor-gate
    app.kubernetes.io/part-of: agent-sandbox-platform
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: command-supervisor-gvisor
  namespace: agent-sandbox-command-supervisor-gate
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: supervisor
          image: agent-sandbox-command-supervisor:stage-6.0-gate
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["SETUID", "SETGID", "KILL"]
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - printf '%s' '{"version":1,"operation":"health"}' | /usr/local/bin/agent-sandbox-ctl | jq -e '.ok == true' >/dev/null
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: supervisor-state
              mountPath: /run
      volumes:
        - name: supervisor-state
          emptyDir:
            sizeLimit: 64Mi
  volumeClaimTemplatesPolicy: Overrides
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 128Mi
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: command-supervisor-gvisor
  namespace: agent-sandbox-command-supervisor-gate
spec:
  replicas: 1
  sandboxTemplateRef:
    name: command-supervisor-gvisor
