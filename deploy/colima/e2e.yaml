apiVersion: v1
kind: Namespace
metadata:
  name: agent-sandbox-platform-e2e
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: platform-gvisor
  namespace: agent-sandbox-platform-e2e
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shell
          image: alpine:3.22
          command: ["sh", "-c", "trap 'exit 0' TERM; while true; do sleep 3600; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
  volumeClaimTemplatesPolicy: Overrides
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 128Mi
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: platform-gvisor
  namespace: agent-sandbox-platform-e2e
spec:
  replicas: 1
  sandboxTemplateRef:
    name: platform-gvisor
