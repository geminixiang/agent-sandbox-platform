# GKE gVisor Pool profile
#
# GKE automatically injects the required gVisor node affinity and toleration for
# Pods whose runtimeClassName is gvisor. The explicit selector/toleration below
# documents and constrains the Standard-cluster scheduling intent. For Autopilot,
# remove nodeSelector and tolerations and retain runtimeClassName: gvisor.

pools:
  coding:
    runtimeClassName: gvisor
    nodeSelector:
      sandbox.gke.io/runtime: gvisor
    tolerations:
      - key: sandbox.gke.io/runtime
        operator: Equal
        value: gvisor
        effect: NoSchedule

  browser:
    enabled: true
    warmPoolName: platform-browser
    runtimeClassName: gvisor
    containerName: browser
    replicas: 1
    image: ghcr.io/geminixiang/agent-sandbox-browser:0.1.0
    command: ["sh", "-c", "trap 'exit 0' TERM; while true; do sleep 3600; done"]
    workspaceSize: 2Gi
    nodeSelector:
      sandbox.gke.io/runtime: gvisor
    tolerations:
      - key: sandbox.gke.io/runtime
        operator: Equal
        value: gvisor
        effect: NoSchedule
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "2", memory: 2Gi }
