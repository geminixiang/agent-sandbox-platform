name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.19.0, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.4"
          enable-cache: true
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run test:package
      - run: go test ./...
      - name: Verify Go SDK
        run: |
          cd packages/sdk-go
          go test -race ./...
          go vet ./...
          cd ../../tests/e2e/go-sdk
          go test ./...
          cd ../../..
          ./scripts/check-go-sdk-module.sh
      - name: Verify benchmark harness
        env:
          PYTHONPATH: packages/sdk-python/src
        run: uv run --with pytest --with pytest-asyncio --with 'httpx>=0.27,<1' pytest tests/benchmark
      - run: ./scripts/check-helm.sh
      - name: Verify pi extension
        working-directory: .pi/extensions/agent-sandbox
        run: |
          npm ci --ignore-scripts
          npm run check
          npm test
          npm audit --omit=dev
      - name: Verify Python SDK
        working-directory: packages/sdk-python
        run: |
          uv sync --locked
          uv run pytest
          uv run pyright
          uv run pyright ../../tests/benchmark
          uv build
          tmp=$(mktemp -d)
          uv venv "$tmp/venv"
          uv pip install --python "$tmp/venv/bin/python" dist/*.whl
          "$tmp/venv/bin/python" -c 'from agent_sandbox import SandboxClient, StaticToken'
