name: Publish images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag (defaults to the commit SHA)
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: agent-sandbox-browser
            dockerfile: images/browser/Dockerfile
            context: images/browser
          - image: agent-sandbox-coding
            dockerfile: images/coding/Dockerfile
            context: images/coding
          - image: agent-sandbox-control-plane
            dockerfile: images/control-plane/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME#v}"
          else
            tag="sha-${GITHUB_SHA::12}"
          fi
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "repository=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image }}" >>"${GITHUB_OUTPUT}"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
