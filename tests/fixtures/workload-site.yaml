apiVersion: v1
kind: ConfigMap
metadata:
  name: workload-fixture
  namespace: agent-sandbox-platform
data:
  server.py: |
    import gzip
    import json
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, urlparse

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, _format, *_args):
            return

        def send(self, status, body, content_type="text/html; charset=utf-8", headers=None):
            payload = body.encode() if isinstance(body, str) else body
            self.send_response(status)
            self.send_header("Content-Type", content_type)
            self.send_header("Content-Length", str(len(payload)))
            for key, value in (headers or {}).items():
                self.send_header(key, value)
            self.end_headers()
            self.wfile.write(payload)

        def do_GET(self):
            path = urlparse(self.path).path
            if path == "/health":
                return self.send(200, "ok", "text/plain")
            if path == "/robots.txt":
                return self.send(200, "User-agent: *\nDisallow: /private\nAllow: /catalog\n", "text/plain")
            if path == "/redirect":
                return self.send(302, b"", headers={"Location": "/catalog/1"})
            if path == "/gzip":
                payload = gzip.compress(json.dumps({"compressed": True, "items": 3}).encode())
                return self.send(200, payload, "application/json", {"Content-Encoding": "gzip"})
            if path == "/catalog/1":
                return self.send(200, '<main><h1>Catalog</h1><a class="item" href="/item/alpha">Alpha</a><a rel="next" href="/catalog/2">Next</a></main>')
            if path == "/catalog/2":
                return self.send(200, '<main><a class="item" href="/item/beta">Beta</a><a class="item" href="/item/gamma">Gamma</a></main>')
            if path.startswith("/item/"):
                name = path.rsplit("/", 1)[-1]
                return self.send(200, f'<article data-id="{name}"><h1>{name.title()}</h1><span class="price">{len(name) * 7}</span></article>')
            if path == "/private":
                return self.send(200, "must not crawl", "text/plain")
            if path == "/app":
                return self.send(200, '''<!doctype html><title>Work Dashboard</title>
                  <h1>Work Dashboard</h1><p id="status">Loading</p>
                  <form id="search"><input name="query" aria-label="Search"><button>Search</button></form>
                  <pre id="result"></pre><button id="popup" onclick="window.open('/popup')">Open details</button>
                  <a id="download" download="report.csv" href="/download">Download report</a>
                  <script>
                    const statusNode = document.querySelector('#status');
                    const searchForm = document.querySelector('#search');
                    const resultNode = document.querySelector('#result');
                    setTimeout(() => { statusNode.textContent = 'Ready'; }, 150);
                    searchForm.addEventListener('submit', async event => {
                      event.preventDefault();
                      const query = new FormData(searchForm).get('query');
                      resultNode.textContent = await (await fetch('/search?q=' + encodeURIComponent(query))).text();
                    });
                  </script>''')
            if path == "/search":
                query = parse_qs(urlparse(self.path).query).get("q", [""])[0]
                return self.send(200, json.dumps({"query": query, "matches": ["alpha", "gamma"]}), "application/json")
            if path == "/popup":
                return self.send(200, "<title>Details</title><h1>Popup details</h1>")
            if path == "/download":
                return self.send(200, "name,value\nalpha,35\ngamma,35\n", "text/csv", {"Content-Disposition": "attachment; filename=report.csv"})
            return self.send(404, "not found", "text/plain")

    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-fixture
  namespace: agent-sandbox-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: workload-fixture }
  template:
    metadata:
      labels: { app: workload-fixture }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: fixture
          image: python:3.13.5-slim-bookworm
          command: ["python", "/app/server.py"]
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /health, port: http } }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 250m, memory: 128Mi }
          volumeMounts:
            - { name: app, mountPath: /app, readOnly: true }
      volumes:
        - name: app
          configMap: { name: workload-fixture }
---
apiVersion: v1
kind: Service
metadata:
  name: workload-fixture
  namespace: agent-sandbox-platform
spec:
  selector: { app: workload-fixture }
  ports:
    - { name: http, port: 8080, targetPort: http }
