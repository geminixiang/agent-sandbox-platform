[project]
name = "agent-sandbox-sdk"
version = "0.1.0"
description = "Python SDK for Agent Sandbox Platform"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "geminixiang" }]
dependencies = ["httpx>=0.27,<1"]

[build-system]
requires = ["uv_build>=0.9.28,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
  "pytest>=8,<9",
  "pytest-asyncio>=0.24,<2",
  "pyright>=1.1.400,<2",
]

[tool.uv.build-backend]
module-name = "agent_sandbox"
module-root = "src"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"
include = ["src", "tests"]
